spring.application.name=creadiTn

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/creadiTn?useSSL=false&serverTimezone=UTC&autoReconnect=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool resilience
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT
jwt.secret=${JWT_SECRET:creaditn-super-secret-key-2026-bnpl-fintech-jwt-256bit}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Local file storage (KYC images served under /api/files/**)
app.upload-dir=uploads

# Server
server.port=8082

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Didit KYC API (leave key empty to use simulated verification)
didit.api.url=https://apx.didit.me/v2
didit.api.key=ZmthgC1o4lKQE4YgVZrrco0p_AgPZdEGygCGTQfmbtE

# Email (Gmail SMTP — set MAIL_USERNAME and MAIL_PASSWORD as environment variables)
# To activate: set env vars MAIL_USERNAME=yourname@gmail.com  MAIL_PASSWORD=your-app-password
# Gmail requires a 16-char App Password (not your real password).
# Get one at: https://myaccount.google.com/apppasswords (2FA must be enabled)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:no-reply@creaditn.tn}